name: blood_donation_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  url_launcher: ^6.3.2
  firebase_messaging: ^16.1.1
  google_generative_ai: ^0.4.7
  google_maps_flutter: ^2.14.2 # 📍 Corrected stable version
  geolocator: ^14.0.2
  geocoding: ^3.0.0 # 📍 NEW: Required for the map search bar logic
  http: ^1.1.0
  googleapis_auth: ^1.4.1
  carousel_slider: ^5.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21